name: Test

on:
  push:
    branches: [ main, kyma, develop ]
  pull_request:
    branches: [ main, kyma ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    # No `|| echo` swallowing: a failing test now fails the pipeline.
    - name: Run backend tests
      run: python -m pytest -v --tb=short --cov=. --cov-report=term-missing

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    # TODO(frontend-lint-cleanup): make this blocking (drop `|| true`) once the
    # pre-existing ESLint errors are resolved in the frontend remediation wave.
    - name: Run linter (non-blocking until lint cleanup lands)
      run: npm run lint || true

    - name: Run frontend tests
      run: npm test
